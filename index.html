<!DOCTYPE html>
<html>
<head>
  <title>Prize Reveal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f0f0f0;
    }
    #storeCode {
      padding: 10px;
      font-size: 16px;
      border: 2px solid #aaa;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #0078d7;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #005fa3;
    }
    #blueBox {
      width: 300px;
      height: 150px;
      background: blue;
      margin: 40px auto;
      border-radius: 10px;
      color: white;
      font-size: 20px;
      font-weight: bold;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #prize {
      font-size: 22px;
      font-weight: bold;
      color: #333;
      display: none;
    }
    #resetBtn {
      display: none;
    }
  </style>
</head>
<body>
  <h2>Prize Reveal Demo</h2>

  <!-- Admin input -->
  <div id="adminInput">
    <input type="text" id="storeCode" placeholder="Enter Store Code">
    <button onclick="showBox()">Load Coupon</button>
  </div>

  <!-- Blue box -->
  <div id="blueBox">Scratch the box</div>

  <!-- Prize -->
  <div id="prize"></div>

  <!-- Reset button -->
  <button id="resetBtn" onclick="resetGame()">Reset</button>

  <script>
    let prizeData = {};

    // Load prizes from Google Sheet CSV
    async function loadPrizes() {
      const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSZvtRa9CPrLCEZHtvegDexXAfg9xEty9SxVrqrXam6PX7t0LhkADKaRcUyM4ko9M2AsZYchVE0qMZN/pub?output=csv");
      const text = await response.text();
      const rows = text.split("\n").map(r => r.split(","));
      rows.forEach(row => {
        const code = row[0].trim();
        const prize = row[1]?.trim();
        if(code && prize) prizeData[code] = prize;
      });
    }
    loadPrizes();

    function showBox() {
      const code = document.getElementById("storeCode").value.trim();
      const prize = prizeData[code] || "Invalid Store Code";

      // Hide admin input
      document.getElementById("adminInput").style.display = "none";

      // Show blue box with message
      const box = document.getElementById("blueBox");
      box.style.display = "flex";

      // Store prize text
      document.getElementById("prize").innerText = prize;

      // Wait for user click anywhere
      document.body.addEventListener("click", revealPrize, { once: true });
    }

    function revealPrize() {
      const box = document.getElementById("blueBox");
      box.style.transition = "opacity 1s";
      box.style.opacity = 0;

      setTimeout(() => {
        box.style.display = "none";
        document.getElementById("prize").style.display = "block";
        document.getElementById("resetBtn").style.display = "inline-block"; // show reset only now
      }, 1000);
    }

    function resetGame() {
      // Reset UI
      document.getElementById("adminInput").style.display = "block";
      document.getElementById("storeCode").value = "";
      document.getElementById("blueBox").style.opacity = 1;
      document.getElementById("blueBox").style.display = "none";
      document.getElementById("prize").style.display = "none";
      document.getElementById("resetBtn").style.display = "none";
    }
  </script>
</body>
</html>
