<!DOCTYPE html>
<html>
<head>
  <title>Scratch Coupon Demo</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/websanova/wScratchPad/dist/wScratchPad.min.js"></script>
  <style>
    #scratchpad {
      width: 300px;
      height: 200px;
      margin: 20px auto;
      border: 2px solid #ccc;
    }
    #prize {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2 style="text-align:center;">Scratch Your Coupon!</h2>
  
  <!-- Store code input -->
  <div style="text-align:center;">
    <input type="text" id="storeCode" placeholder="Enter Store Code">
    <button onclick="revealPrize()">Get Prize</button>
  </div>

  <!-- Scratchpad area -->
  <div id="scratchpad"></div>
  <div id="prize"></div>

  <script>
    // Example store code to prize mapping
    const prizeMap = {
      "STORE1001": "10% OFF",
      "STORE2002": "Free Coffee",
      "STORE3003": "Buy 1 Get 1 Free",
      "STORE4004": "₹100 Voucher"
    };

    function revealPrize() {
      const code = document.getElementById("storeCode").value.trim();
      const prize = prizeMap[code] || "Invalid Store Code";
      document.getElementById("prize").innerText = prize;

      // Initialize scratchpad with prize underneath
      $('#scratchpad').wScratchPad({
        size        : 50,          // Scratch brush size
        bg          : '#ddd',      // Background (scratch layer)
        fg          : '#999',      // Foreground (cover layer)
        cursor      : 'crosshair',
        scratchDown : function(e, percent){
          if(percent > 50){ // Once 50% scratched, reveal prize
            $('#scratchpad').wScratchPad('clear');
          }
        }
      });
    }
  </script>
</body>
</html>
