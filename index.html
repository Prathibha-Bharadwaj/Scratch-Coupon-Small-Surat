<!DOCTYPE html>
<html>
<head>
  <title>Get Gift Item at Rs1!</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 40px;
      background: #f0f0f0;
      overflow: hidden;
    }
    #storeCode {
      padding: 10px;
      font-size: 16px;
      border: 2px solid #aaa;
      border-radius: 5px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #0078d7;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #005fa3;
    }

    #revealContainer {
      position: relative;
      width: 300px;
      height: 150px;
      margin: 40px auto;
    }

    #blueBox, #prize {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      opacity: 0;
    }

    #blueBox {
      background: blue;
      color: white;
      cursor: pointer;
      display: none;
    }

    #prize {
      background: #f0f0f0;
      color: #333;
      display: none;
    }

    /* Dissolve animation for blue box */
    @keyframes dissolveOut {
      0% { opacity: 1; transform: scale(1); filter: blur(0px); }
      100% { opacity: 0; transform: scale(2); filter: blur(20px); }
    }

    /* Pop animation for prize */
    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1); }
    }

    #resetBtn {
      display: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h2>Get Gift Item at Rs1!</h2>

  <div id="adminInput">
    <input type="text" id="storeCode" placeholder="Enter Store Code">
    <button onclick="showBox()">Load Coupon</button>
  </div>

  <div id="revealContainer">
    <div id="blueBox">Click to Reveal Gift Item</div>
    <div id="prize"></div>
  </div>

  <button id="resetBtn" onclick="resetGame()">Reset</button>
  <canvas id="confetti"></canvas>

  <script>
    let prizeData = {};

    async function loadPrizes() {
      const response = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSZvtRa9CPrLCEZHtvegDexXAfg9xEty9SxVrqrXam6PX7t0LhkADKaRcUyM4ko9M2AsZYchVE0qMZN/pub?output=csv");
      const text = await response.text();
      const rows = text.split("\n").map(r => r.split(","));
      prizeData = {}; // clear old data
      rows.forEach(row => {
        const code = row[0].trim();
        const prize = row[1]?.trim();
        if(code && prize) prizeData[code] = prize;
      });
    }

    async function showBox() {
      // Always refresh Google Sheet before showing box
      await loadPrizes();

      const code = document.getElementById("storeCode").value.trim();
      const prize = prizeData[code] || "Invalid Store Code";

      document.getElementById("adminInput").style.display = "none";

      const box = document.getElementById("blueBox");
      const prizeDiv = document.getElementById("prize");

      prizeDiv.innerText = prize;

      box.style.display = "flex";
      box.style.opacity = 1;

      box.addEventListener("click", revealPrize, { once: true });
    }

    function revealPrize() {
      const box = document.getElementById("blueBox");
      const prize = document.getElementById("prize");

      // Show prize in same position
      prize.style.display = "flex";

      // Animate dissolve of blue box
      box.style.animation = "dissolveOut 3s forwards";

      // Animate prize pop-in simultaneously
      prize.style.animation = "popIn 3s forwards";

      // Confetti
      startConfetti();

      setTimeout(() => {
        box.style.display = "none";
        document.getElementById("resetBtn").style.display = "inline-block";
      }, 3000);
    }

    function resetGame() {
      document.getElementById("adminInput").style.display = "block";
      document.getElementById("storeCode").value = "";
      const box = document.getElementById("blueBox");
      box.style.opacity = 1;
      box.style.display = "none";
      box.style.animation = "";
      const prize = document.getElementById("prize");
      prize.style.display = "none";
      prize.style.opacity = 0;
      prize.style.animation = "";
      document.getElementById("resetBtn").style.display = "none";
      stopConfetti();
    }

    // Confetti
    const canvas = document.getElementById("confetti");
    const ctx = canvas.getContext("2d");
    let confettiPieces = [];
    let animationFrame;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    function startConfetti() {
      confettiPieces = Array.from({length: 150}, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: Math.random() * 6 + 4,
        color: `hsl(${Math.random() * 360},100%,50%)`
      }));
      animateConfetti();
      setTimeout(stopConfetti, 3000);
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiPieces.forEach(p => {
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true);
        ctx.fill();
        p.y += p.r/2;
        if(p.y > canvas.height) {
          p.y = -10;
          p.x = Math.random() * canvas.width;
        }
      });
      animationFrame = requestAnimationFrame(animateConfetti);
    }

    function stopConfetti() {
      cancelAnimationFrame(animationFrame);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  </script>
</body>
</html>
